<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAT Portal — Home</title>
  <meta name="description" content="The home of IAT's in-house tools — forms, support ticketing, and more." />
  <meta name="theme-color" content="#089447" />
  <!-- Social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="IAT Portal — Home" />
  <meta property="og:description" content="The central hub for IAT's in-house tools — forms, support, and everything that comes next." />
  <meta property="og:image" content="iat-logo.png" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/png" href="iat-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────────────────────
       IAT Portal — Home
       Self-contained landing page. To add an app, edit the APPS array
       near the bottom of this file. No build step required.
       ───────────────────────────────────────────────────────────── */

    :root {
      --brand: #089447;
      --brand-hover: #077a3c;
      --brand-light: #f0faf4;
      --navy: #1a1a2e;

      --bg: #f5f5f7;
      --bg-elev: #ffffff;
      --surface: #ffffff;
      --surface-soft: #fafafa;
      --border: rgba(0, 0, 0, 0.07);
      --border-strong: #e5e7eb;
      --text-primary: #0a0a0b;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);

      --hero: linear-gradient(135deg, #f0faf4 0%, #fafffe 45%, #f0f9ff 100%);
    }

    [data-theme="dark"] {
      --bg: #09090b;
      --bg-elev: #18181b;
      --surface: #18181b;
      --surface-soft: #1c1c1f;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: #27272a;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 2px 12px rgba(0,0,0,0.3);
      --shadow-card-hover: 0 6px 24px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);

      --hero: linear-gradient(135deg, #18181b 0%, #1c1c1f 40%, #121214 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
      transition: background 0.2s ease, color 0.2s ease;
    }

    a { color: inherit; text-decoration: none; }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; width: 100%; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 30;
      height: 56px; display: flex; align-items: center;
      background: rgba(245,245,247,0.8);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    [data-theme="dark"] header { background: rgba(9,9,11,0.8); }

    .header-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }

    .logo-link { display: flex; align-items: center; gap: 10px; }
    .logo-badge {
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-badge img { width: 19px; height: 19px; object-fit: contain; }
    [data-theme="light"] .logo-badge img { mix-blend-mode: multiply; }
    .logo-text { display: flex; align-items: center; gap: 7px; }
    .logo-brand { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-primary); }
    .logo-sep { color: var(--text-muted); font-size: 14px; }
    .logo-sub { font-size: 15px; font-weight: 500; color: var(--text-secondary); }

    /* Theme toggle */
    .theme-toggle { display: flex; align-items: center; gap: 2px; padding: 2px; border-radius: 9px; background: rgba(0,0,0,0.05); }
    [data-theme="dark"] .theme-toggle { background: rgba(255,255,255,0.06); }
    .theme-btn {
      width: 28px; height: 24px; border-radius: 7px; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: all 0.15s ease;
    }
    .theme-btn:hover { color: var(--text-secondary); }
    .theme-btn.active { background: rgba(8,148,71,0.15); color: var(--brand); }
    .theme-btn svg { width: 14px; height: 14px; }

    /* ── HERO ── */
    .hero { background: var(--hero); border-bottom: 1px solid var(--border); transition: background 0.2s ease; }
    .hero-inner { padding: 76px 24px 64px; text-align: center; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
      color: var(--brand); background: rgba(8,148,71,0.1);
      padding: 5px 12px; border-radius: 999px; margin-bottom: 22px;
    }
    .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--brand); box-shadow: 0 0 0 3px rgba(8,148,71,0.2); }
    .hero h1 {
      font-size: clamp(38px, 6vw, 60px); font-weight: 800; letter-spacing: -0.035em;
      line-height: 1.02; margin-bottom: 18px; text-wrap: balance;
    }
    .hero h1 .accent { color: var(--brand); }
    .hero p {
      font-size: clamp(15px, 2.2vw, 18px); color: var(--text-secondary);
      max-width: 560px; margin: 0 auto; line-height: 1.55; text-wrap: balance;
    }

    /* ── APP GRID ── */
    .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin: 56px 0 22px; }
    .section-head h2 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .section-head .count { font-size: 12px; font-weight: 600; color: var(--text-muted); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; padding-bottom: 16px; }

    .card {
      position: relative; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 18px; padding: 24px; min-height: 196px;
      box-shadow: var(--shadow-card);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      overflow: hidden;
    }
    .card::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(120% 120% at 100% 0%, var(--accent-glow, transparent) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.18s ease; pointer-events: none;
    }
    a.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card-hover); border-color: var(--accent, var(--border-strong)); }
    a.card:hover::after { opacity: 1; }
    a.card:active { transform: translateY(-1px); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: auto; }
    .icon-tile {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--accent-soft, rgba(0,0,0,0.04)); color: var(--accent, var(--text-secondary));
    }
    .icon-tile svg { width: 22px; height: 22px; }

    .badge {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 999px; white-space: nowrap;
    }
    .badge.live { color: var(--brand); background: rgba(8,148,71,0.12); }
    .badge.soon { color: var(--text-muted); background: rgba(0,0,0,0.05); }
    [data-theme="dark"] .badge.soon { background: rgba(255,255,255,0.06); }
    .badge .pulse { display: inline-block; width: 5px; height: 5px; border-radius: 999px; background: var(--brand); margin-right: 5px; vertical-align: middle; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    .card-body { margin-top: 20px; }
    .card-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 7px; }
    a.card:hover .card-title .arrow { transform: translateX(3px); opacity: 1; }
    .card-title .arrow { width: 15px; height: 15px; opacity: 0; transform: translateX(-2px); transition: all 0.18s ease; color: var(--accent, var(--text-muted)); }
    .card-desc { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; margin-top: 7px; }
    .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { padding: 3px 9px; border-radius: 7px; background: var(--surface-soft); border: 1px solid var(--border); font-weight: 500; }

    .card.disabled { cursor: default; opacity: 0.85; }
    .card.disabled .card-title { color: var(--text-secondary); }

    /* Add-app placeholder */
    .card.add {
      align-items: center; justify-content: center; text-align: center;
      border-style: dashed; background: transparent; box-shadow: none; color: var(--text-muted);
    }
    .card.add .icon-tile { background: transparent; border: 1px dashed var(--border-strong); color: var(--text-muted); }
    .card.add .card-title { font-size: 15px; color: var(--text-secondary); }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); margin-top: 64px; }
    .footer-inner { padding: 28px 24px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-inner .left { display: flex; align-items: center; gap: 9px; font-size: 13px; color: var(--text-muted); }
    .footer-inner .left img { width: 16px; height: 16px; object-fit: contain; }
    [data-theme="light"] .footer-inner .left img { mix-blend-mode: multiply; }
    .footer-inner .right { font-size: 13px; color: var(--text-muted); }

    /* Entrance animation */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .anim { opacity: 0; animation: fadeUp 0.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    @media (prefers-reduced-motion: reduce) {
      .anim { animation: none; opacity: 1; }
      * { transition: none !important; }
    }

    @media (max-width: 560px) {
      .hero-inner { padding: 56px 24px 48px; }
      .grid { grid-template-columns: 1fr; }
      .logo-sub { display: none; }
      .logo-sep { display: none; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="wrap header-inner">
      <a class="logo-link" href="/" aria-label="IAT Portal home">
        <span class="logo-badge"><img src="iat-logo.png" alt="IAT" /></span>
        <span class="logo-text">
          <span class="logo-brand">IAT</span>
          <span class="logo-sep">/</span>
          <span class="logo-sub">Portal</span>
        </span>
      </a>
      <div class="theme-toggle" role="group" aria-label="Color theme">
        <button class="theme-btn" data-set-theme="light" title="Light" aria-label="Light theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        </button>
        <button class="theme-btn" data-set-theme="dark" title="Dark" aria-label="Dark theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="wrap hero-inner">
      <span class="eyebrow anim" style="animation-delay:.02s"><span class="dot"></span>Innovative Air Technologies</span>
      <h1 class="anim" style="animation-delay:.06s">One home for<br /><span class="accent">every IAT tool</span></h1>
      <p class="anim" style="animation-delay:.12s">The central hub for the apps we build and run in-house — forms, support, and everything that comes next. Pick a tool below to get started.</p>
    </div>
  </section>

  <!-- APPS -->
  <main class="wrap">
    <div class="section-head anim" style="animation-delay:.16s">
      <h2>Applications</h2>
      <span class="count" id="app-count"></span>
    </div>
    <div class="grid" id="app-grid"></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="wrap footer-inner">
      <div class="left">
        <img src="iat-logo.png" alt="" />
        <span>IAT Portal — built &amp; hosted in-house</span>
      </div>
      <div class="right">&copy; <span id="year"></span> Innovative Air Technologies</div>
    </div>
  </footer>

  <script>
    /* ─────────────────────────────────────────────────────────────
       APPS — add a new entry here to publish a card. That's the only
       change needed to list another tool on the home page.
         status:  'live'  → clickable card
                  'soon'  → shown, dimmed, not clickable
         accent:  hex used for the icon tile, hover border, and glow.
         icon:    inline SVG path content (24×24 viewBox, stroke style).
       ───────────────────────────────────────────────────────────── */
    const APPS = [
      {
        title: 'Forms Portal',
        href: 'https://iatportal.vercel.app',
        desc: 'The internal employee hub — submit and manage forms, request time off, browse the staff directory, and administer support tickets.',
        status: 'live',
        accent: '#089447',
        tags: ['Employees', 'Forms', 'PTO', 'Directory'],
        icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/>'
      },
      {
        title: 'Support Ticketing',
        href: 'https://iatportal.vercel.app/support',
        desc: 'The customer-facing site where clients report equipment problems through a guided wizard, with photo uploads and AI-suggested first steps.',
        status: 'live',
        accent: '#0ea5e9',
        tags: ['Customers', 'Tickets', 'AI assist'],
        icon: '<path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>'
      },
      // ── Add future apps here ──────────────────────────────────────
      // {
      //   title: 'IAT Learn',
      //   href: '#',
      //   desc: 'Training & onboarding courses for the team.',
      //   status: 'soon',
      //   accent: '#8b5cf6',
      //   tags: ['Training'],
      //   icon: '<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>'
      // },
    ];

    const ARROW = '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

    function svg(content, cls) {
      return '<svg class="' + (cls || '') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">' + content + '</svg>';
    }

    function hexToRgba(hex, a) {
      const n = parseInt(hex.slice(1), 16);
      return 'rgba(' + (n >> 16 & 255) + ',' + (n >> 8 & 255) + ',' + (n & 255) + ',' + a + ')';
    }

    function renderCard(app, i) {
      const isLive = app.status === 'live';
      const tag = isLive ? 'a' : 'div';
      const accentVars =
        '--accent:' + app.accent + ';' +
        '--accent-soft:' + hexToRgba(app.accent, 0.12) + ';' +
        '--accent-glow:' + hexToRgba(app.accent, 0.06) + ';';
      const badge = isLive
        ? '<span class="badge live"><span class="pulse"></span>Live</span>'
        : '<span class="badge soon">Coming soon</span>';
      const attrs = isLive
        ? ' href="' + app.href + '"'
        : '';
      const tags = (app.tags || []).map(t => '<span class="tag">' + t + '</span>').join('');

      return '<' + tag + ' class="card anim' + (isLive ? '' : ' disabled') + '"' + attrs +
        ' style="' + accentVars + 'animation-delay:' + (0.2 + i * 0.05).toFixed(2) + 's">' +
          '<div class="card-top">' +
            '<span class="icon-tile">' + svg(app.icon) + '</span>' + badge +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-title">' + app.title + (isLive ? ARROW : '') + '</div>' +
            '<p class="card-desc">' + app.desc + '</p>' +
            (tags ? '<div class="card-meta">' + tags + '</div>' : '') +
          '</div>' +
        '</' + tag + '>';
    }

    const grid = document.getElementById('app-grid');
    grid.innerHTML =
      APPS.map(renderCard).join('') +
      // "more on the way" placeholder — remove once the roster feels full
      '<div class="card add anim" style="animation-delay:' + (0.2 + APPS.length * 0.05).toFixed(2) + 's">' +
        '<span class="icon-tile">' + svg('<path d="M12 5v14M5 12h14"/>') + '</span>' +
        '<div class="card-title" style="margin-top:14px">More on the way</div>' +
        '<p class="card-desc" style="text-align:center">New IAT tools land here as we build them.</p>' +
      '</div>';

    const liveCount = APPS.filter(a => a.status === 'live').length;
    document.getElementById('app-count').textContent =
      liveCount + (liveCount === 1 ? ' app live' : ' apps live');

    document.getElementById('year').textContent = new Date().getFullYear();

    /* ── Theme: system default, click to override, remembered per browser ── */
    (function () {
      const KEY = 'iat-theme';
      const root = document.documentElement;
      const mql = window.matchMedia('(prefers-color-scheme: dark)');

      function apply(theme) {
        root.setAttribute('data-theme', theme);
        document.querySelectorAll('[data-set-theme]').forEach(b =>
          b.classList.toggle('active', b.dataset.setTheme === theme));
      }
      function current() {
        return localStorage.getItem(KEY) || (mql.matches ? 'dark' : 'light');
      }
      apply(current());
      mql.addEventListener('change', () => { if (!localStorage.getItem(KEY)) apply(current()); });
      document.querySelectorAll('[data-set-theme]').forEach(b =>
        b.addEventListener('click', () => { localStorage.setItem(KEY, b.dataset.setTheme); apply(b.dataset.setTheme); }));
    })();
  </script>
</body>
</html>
